syntax = "proto3";
package rps.v1;

// RPS Plugin Scanner gRPC Service
service RpsService {
  // Start a scan — returns a stream of events until completion.
  // Returns ALREADY_EXISTS if a scan is already running.
  rpc StartScan(StartScanRequest) returns (stream ScanEvent);

  // Stop a running scan gracefully.
  rpc StopScan(StopScanRequest) returns (StopScanResponse);

  // Query server status (idle/scanning, uptime, db path).
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // Graceful server shutdown. Drains active scan first.
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);

  // List all successfully scanned plugins from the database.
  rpc ListPlugins(ListPluginsRequest) returns (ListPluginsResponse);

  // Open a plugin's native GUI in an isolated process.
  // Returns a stream of GUI lifecycle events until the GUI is closed.
  rpc OpenPluginGui(OpenPluginGuiRequest) returns (stream PluginEvent);

  // Close a currently open plugin GUI (window closes, session stays alive).
  rpc ClosePluginGui(ClosePluginGuiRequest) returns (ClosePluginGuiResponse);

  // Show the GUI window for a headless plugin session.
  rpc ShowPluginGui(ShowPluginGuiRequest) returns (ShowPluginGuiResponse);

  // Close the entire plugin session (terminates the host process).
  rpc ClosePluginSession(ClosePluginSessionRequest) returns (ClosePluginSessionResponse);

  // Get the complete state of a running plugin GUI as an opaque binary blob.
  rpc GetPluginState(GetPluginStateRequest) returns (GetPluginStateResponse);

  // Restore plugin state from a previously saved binary blob.
  rpc SetPluginState(SetPluginStateRequest) returns (SetPluginStateResponse);

  // Load a preset by its id within a running plugin GUI.
  rpc LoadPreset(LoadPresetRequest) returns (LoadPresetResponse);

  // Bidirectional audio streaming through a hosted plugin.
  // Requires an active GUI session with audio enabled (OpenPluginGui with enable_audio=true).
  // Adds gRPC network latency compared to the local shared memory path.
  rpc StreamAudio(stream AudioInputBlock) returns (stream AudioOutputBlock);

  // List available audio device backends and their devices.
  rpc ListAudioDevices(ListAudioDevicesRequest) returns (ListAudioDevicesResponse);

  // ---------------------------------------------------------------------------
  // Graph lifecycle (Phase 8)
  // ---------------------------------------------------------------------------

  // Create a new audio processing graph.
  rpc CreateGraph(CreateGraphRequest) returns (CreateGraphResponse);

  // Destroy a graph and free all resources.
  rpc DestroyGraph(DestroyGraphRequest) returns (DestroyGraphResponse);

  // Add a typed node to a graph.
  rpc AddNode(AddNodeRequest) returns (AddNodeResponse);

  // Connect two nodes in a graph.
  rpc ConnectNodes(ConnectNodesRequest) returns (ConnectNodesResponse);

  // Validate a graph without activating it.
  rpc ValidateGraph(ValidateGraphRequest) returns (ValidateGraphResponse);

  // Activate a graph for audio processing.
  rpc ActivateGraph(ActivateGraphRequest) returns (ActivateGraphResponse);

  // Deactivate a running graph.
  rpc DeactivateGraph(DeactivateGraphRequest) returns (DeactivateGraphResponse);

  // Get summary info about a graph.
  rpc GetGraphInfo(GetGraphInfoRequest) returns (GetGraphInfoResponse);

  // ---------------------------------------------------------------------------
  // Chain convenience API (Phase 8)
  // ---------------------------------------------------------------------------

  // Create a linear plugin chain: input -> plugin1 -> ... -> output.
  // Internally creates a graph, adds nodes, connects them, and activates.
  rpc CreateChain(CreateChainRequest) returns (CreateChainResponse);

  // Destroy a chain (alias for DestroyGraph).
  rpc DestroyChain(DestroyChainRequest) returns (DestroyChainResponse);

  // ---------------------------------------------------------------------------
  // Graph detail & mutation (Phase 11)
  // ---------------------------------------------------------------------------

  // Get detailed graph content: all nodes and edges.
  rpc GetGraphDetail(GetGraphDetailRequest) returns (GetGraphDetailResponse);

  // Remove a node and its connected edges from a graph.
  rpc RemoveNode(RemoveNodeRequest) returns (RemoveNodeResponse);

  // Remove an edge (disconnect two nodes).
  rpc DisconnectNodes(DisconnectNodesRequest) returns (DisconnectNodesResponse);

  // Open a plugin GUI for a specific node within a graph.
  rpc OpenGraphNodeGui(OpenGraphNodeGuiRequest) returns (stream PluginEvent);

  // Close a plugin GUI for a specific node within a graph.
  rpc CloseGraphNodeGui(CloseGraphNodeGuiRequest) returns (CloseGraphNodeGuiResponse);
}

// ---------------------------------------------------------------------------
// Request / Response messages
// ---------------------------------------------------------------------------

message StartScanRequest {
  repeated string scan_dirs = 1;   // --scan-dir (empty = use OS defaults)
  string single_plugin = 2;       // --scan (single file path)
  string mode = 3;                // "full" | "incremental" (default: "incremental")
  string formats = 4;             // "all" | "vst3,clap" (default: "all")
  string filter = 5;              // filename substring filter
  uint32 limit = 6;               // 0 = unlimited
  uint32 jobs = 7;                // parallel workers (default: 6)
  uint32 retries = 8;             // max retries per plugin (default: 3)
  uint32 timeout_ms = 9;          // per-plugin timeout in ms (default: 120000)
  bool verbose = 10;              // enable debug-level logging
}

message StopScanRequest {}
message StopScanResponse {
  bool was_running = 1;
}

message GetStatusRequest {}
message GetStatusResponse {
  enum ServerState {
    IDLE = 0;
    SCANNING = 1;
  }
  ServerState state = 1;
  int64 uptime_ms = 2;
  string db_path = 3;
}

message ShutdownRequest {}
message ShutdownResponse {}

// ---------------------------------------------------------------------------
// Streaming scan events
// ---------------------------------------------------------------------------

message ScanEvent {
  oneof event {
    ScanStarted scan_started = 1;
    PluginStarted plugin_started = 2;
    PluginProgress plugin_progress = 3;
    PluginCompleted plugin_completed = 4;
    PluginRetry plugin_retry = 5;
    WorkerLog worker_log = 6;
    MonitorReport monitor_report = 7;
    ScanCompleted scan_completed = 8;
  }
}

message ScanStarted {
  uint32 total_plugins = 1;       // plugins to scan (after filtering)
  uint32 worker_count = 2;
  uint32 skipped_unchanged = 3;   // incremental: unchanged plugins
  uint32 skipped_blocked = 4;     // incremental: previously blocked
}

message PluginStarted {
  uint32 worker_id = 1;
  uint32 plugin_index = 2;
  uint32 total_plugins = 3;
  string plugin_path = 4;
  string plugin_filename = 5;
}

message PluginProgress {
  uint32 worker_id = 1;
  string plugin_path = 2;
  int32 percentage = 3;           // 0-100
  string stage = 4;               // e.g. "Loading DLL...", "Querying parameters..."
}

message PluginCompleted {
  uint32 worker_id = 1;
  string plugin_path = 2;
  string plugin_filename = 3;
  Outcome outcome = 4;
  int64 elapsed_ms = 5;
  // Populated on success:
  string plugin_name = 6;
  string plugin_version = 7;
  string plugin_vendor = 8;
  string plugin_format = 9;
  // Populated on failure:
  string error_message = 10;
}

enum Outcome {
  OUTCOME_UNKNOWN = 0;
  OUTCOME_SUCCESS = 1;
  OUTCOME_FAIL = 2;
  OUTCOME_CRASH = 3;
  OUTCOME_TIMEOUT = 4;
  OUTCOME_SKIPPED = 5;
}

message PluginRetry {
  uint32 worker_id = 1;
  string plugin_path = 2;
  uint32 attempt = 3;
  uint32 max_retries = 4;
  string reason = 5;
}

message WorkerLog {
  uint32 worker_id = 1;
  string plugin_path = 2;
  string line = 3;
  bool is_stderr = 4;
}

message MonitorReport {
  repeated ActiveWorker workers = 1;
}

message ActiveWorker {
  uint32 worker_id = 1;
  string plugin_path = 2;
  int64 elapsed_ms = 3;
}

message ScanCompleted {
  uint32 success = 1;
  uint32 fail = 2;
  uint32 crash = 3;
  uint32 timeout = 4;
  uint32 skipped = 5;
  int64 total_ms = 6;
  repeated FailedPlugin failures = 7;
}

message FailedPlugin {
  string path = 1;
  string reason = 2;
}

// ---------------------------------------------------------------------------
// Plugin listing
// ---------------------------------------------------------------------------

message ListPluginsRequest {
  string format_filter = 1;       // e.g. "clap", "" = all formats
}

message PluginInfo {
  int64 id = 1;
  string format = 2;
  string path = 3;
  string name = 4;
  string uid = 5;
  string vendor = 6;
  string version = 7;
  string category = 8;
  uint32 num_inputs = 9;
  uint32 num_outputs = 10;
}

message ListPluginsResponse {
  repeated PluginInfo plugins = 1;
}

// ---------------------------------------------------------------------------
// Plugin GUI lifecycle
// ---------------------------------------------------------------------------

message OpenPluginGuiRequest {
  string plugin_path = 1;         // DB path column — unique per scanned plugin
  string format = 2;              // "clap", "vst3", etc.
  // Audio processing configuration (Phase 1)
  bool enable_audio = 3;
  uint32 sample_rate = 4;         // e.g. 48000
  uint32 block_size = 5;          // e.g. 128
  uint32 num_channels = 6;        // e.g. 2 (stereo)

  // Audio device backend for real-time playback (e.g. "sdl3").
  // Empty = offline only (no device, existing batch mode).
  string audio_device = 7;
}

message PluginEvent {
  oneof event {
    GuiOpened gui_opened = 1;
    GuiClosed gui_closed = 2;
    GuiError gui_error = 3;
    ParameterList parameter_list = 4;       // Full param list, sent once after open
    ParameterUpdates parameter_updates = 5; // Delta updates, streamed
    PresetList preset_list = 6;             // Available presets, sent once after open
    PresetLoaded preset_loaded = 7;         // Preset was loaded (via GUI or API)
    AudioReady audio_ready = 8;             // Audio processing ready, shm info
    AudioDeviceStarted audio_device_started = 9; // Real-time audio device opened
  }
}

message AudioReady {
  string shm_name = 1;             // Shared memory segment name for mmap
  uint32 sample_rate = 2;
  uint32 block_size = 3;
  uint32 num_channels = 4;
  uint32 ring_blocks = 5;
  uint32 latency_samples = 6;      // Plugin-reported latency (for future PDC)
}

// ---------------------------------------------------------------------------
// gRPC Audio Streaming (network-transparent, higher latency than shared memory)
// ---------------------------------------------------------------------------

message AudioInputBlock {
  string plugin_path = 1;          // Route to the correct GUI session
  bytes audio_data = 2;            // Interleaved float32 samples (blockSize × numChannels × 4 bytes)
  uint64 sequence = 3;             // Monotonic sequence number for ordering
}

message AudioOutputBlock {
  bytes audio_data = 1;            // Processed interleaved float32 samples
  uint64 sequence = 2;             // Echoed sequence number
}

message GuiOpened {
  string plugin_name = 1;
  uint32 width = 2;
  uint32 height = 3;
}

message GuiClosed {
  string reason = 1;              // "user", "host", "crash"
}

message GuiError {
  string error = 1;
  string details = 2;
}

message ClosePluginGuiRequest {
  string plugin_path = 1;
}

message ClosePluginGuiResponse {
  bool was_open = 1;
}

message ShowPluginGuiRequest {
  string plugin_path = 1;
}

message ShowPluginGuiResponse {
  bool success = 1;
}

message ClosePluginSessionRequest {
  string plugin_path = 1;
}

message ClosePluginSessionResponse {
  bool was_open = 1;
}

// ---------------------------------------------------------------------------
// Plugin parameters (universal, format-agnostic)
// ---------------------------------------------------------------------------

message PluginParameter {
  string id = 1;                // Unique identifier (string for cross-format compat)
  uint32 index = 2;             // Positional index
  string name = 3;              // Human-readable display name
  string module = 4;            // Hierarchical group path (e.g. "Osc/Filter"), empty if N/A
  double min_value = 5;         // Minimum plain value
  double max_value = 6;         // Maximum plain value
  double default_value = 7;     // Default plain value
  double current_value = 8;     // Current plain value
  string display_text = 9;      // Formatted display (e.g. "2.3 kHz")
  uint32 flags = 10;            // Bitmask: STEPPED=1, HIDDEN=2, READONLY=4, BYPASS=8, ENUM=16
}

message ParameterList {
  repeated PluginParameter parameters = 1;
}

message ParameterUpdate {
  string param_id = 1;
  double value = 2;
  string display_text = 3;
}

message ParameterUpdates {
  repeated ParameterUpdate updates = 1;
}

// ---------------------------------------------------------------------------
// Plugin State Save/Restore
// ---------------------------------------------------------------------------

message GetPluginStateRequest {
  string plugin_path = 1;
}

message GetPluginStateResponse {
  bytes state_data = 1;    // Opaque binary blob from the plugin
  string format = 2;       // Plugin format (e.g. "clap") for validation
  bool success = 3;
  string error = 4;
}

message SetPluginStateRequest {
  string plugin_path = 1;
  bytes state_data = 2;
}

message SetPluginStateResponse {
  bool success = 1;
  string error = 2;
}

// ---------------------------------------------------------------------------
// Preset Enumeration / Loading
// ---------------------------------------------------------------------------

message PresetInfo {
  string id = 1;                // Unique key (load_key for CLAP, program index for VST3, etc.)
  string name = 2;              // Human-readable display name
  string category = 3;          // Category/module path from plugin features
  string creator = 4;           // Preset author (optional)
  uint32 index = 5;             // Ordering index
  uint32 flags = 6;             // Bitmask: FACTORY=1, USER=2, FAVORITE=4
}

message PresetList {
  repeated PresetInfo presets = 1;
}

message PresetLoaded {
  string preset_id = 1;
  string preset_name = 2;
}

message LoadPresetRequest {
  string plugin_path = 1;
  string preset_id = 2;
}

message LoadPresetResponse {
  bool success = 1;
  string error = 2;
}

// ---------------------------------------------------------------------------
// Audio device messages
// ---------------------------------------------------------------------------

message AudioDeviceStarted {
  string backend = 1;              // e.g. "SDL3"
  string device_name = 2;          // Human-readable device name
  uint32 actual_sample_rate = 3;   // Negotiated sample rate
  uint32 actual_block_size = 4;    // Negotiated block size
}

message ListAudioDevicesRequest {
  string backend = 1;              // Filter by backend (e.g. "sdl3"), empty = all
}

message AudioDeviceEntry {
  string backend = 1;
  string device_id = 2;
  string name = 3;
  uint32 max_input_channels = 4;
  uint32 max_output_channels = 5;
  bool is_default = 6;
}

message ListAudioDevicesResponse {
  repeated AudioDeviceEntry devices = 1;
}

// ---------------------------------------------------------------------------
// Graph API messages (Phase 8)
// ---------------------------------------------------------------------------

message ChannelLayoutMsg {
  string format = 1;              // "stereo", "mono", "5.1", etc.
  uint32 channel_count = 2;
}

// A graph node description. Use the type field to determine which config is populated.
message GraphNodeMsg {
  string id = 1;
  string type = 2;                // "input", "output", "plugin", "gain", "mixer", etc.
  uint32 latency_samples = 3;
  string slice_hint = 4;          // For default slicing strategy

  // Plugin config (type="plugin")
  string plugin_path = 10;
  string plugin_format = 11;      // "vst3", "clap"
  ChannelLayoutMsg plugin_io_layout = 12;

  // Input/Output config (type="input" or "output")
  ChannelLayoutMsg io_layout = 20;
  string shm_name = 21;

  // Gain config (type="gain")
  float gain_value = 30;
  bool gain_mute = 31;
  bool gain_bypass = 32;
  ChannelLayoutMsg gain_layout = 33;

  // Mixer config (type="mixer")
  ChannelLayoutMsg mixer_output_layout = 40;
  uint32 mixer_num_inputs = 41;
  repeated float mixer_input_gains = 42;
}

message CreateGraphRequest {
  uint32 sample_rate = 1;         // e.g. 48000
  uint32 block_size = 2;          // e.g. 128
}

message CreateGraphResponse {
  string graph_id = 1;
}

message DestroyGraphRequest {
  string graph_id = 1;
}

message DestroyGraphResponse {}

message AddNodeRequest {
  string graph_id = 1;
  GraphNodeMsg node = 2;
}

message AddNodeResponse {
  string node_id = 1;
}

message ConnectNodesRequest {
  string graph_id = 1;
  string source_node_id = 2;
  uint32 source_port = 3;
  string dest_node_id = 4;
  uint32 dest_port = 5;
}

message ConnectNodesResponse {
  string edge_id = 1;
}

message ValidateGraphRequest {
  string graph_id = 1;
}

message ValidateGraphResponse {
  bool valid = 1;
  repeated string errors = 2;
}

message ActivateGraphRequest {
  string graph_id = 1;
  string strategy = 2;            // "performance" (default), "default", "crash_isolation"
}

message ActivateGraphResponse {
  bool success = 1;
  string error = 2;
  uint32 slice_count = 3;
}

message DeactivateGraphRequest {
  string graph_id = 1;
}

message DeactivateGraphResponse {}

message GetGraphInfoRequest {
  string graph_id = 1;
}

message GetGraphInfoResponse {
  string graph_id = 1;
  string state = 2;               // "inactive", "active"
  uint32 node_count = 3;
  uint32 edge_count = 4;
  uint32 slice_count = 5;
  string strategy = 6;
  string name = 7;                // User-assigned graph name (may be empty)
}

// ---------------------------------------------------------------------------
// Chain API messages (Phase 8)
// ---------------------------------------------------------------------------

message ChainPluginEntry {
  string plugin_path = 1;         // DB path to the plugin
  string format = 2;              // "vst3", "clap"
}

message CreateChainRequest {
  repeated ChainPluginEntry plugins = 1;
  uint32 sample_rate = 2;         // e.g. 48000 (default if 0)
  uint32 block_size = 3;          // e.g. 128 (default if 0)
  uint32 num_channels = 4;        // e.g. 2 (stereo, default if 0)
  string name = 5;                // Optional user-friendly name
}

message CreateChainResponse {
  string graph_id = 1;            // The underlying graph ID
  bool success = 2;
  string error = 3;
}

message DestroyChainRequest {
  string graph_id = 1;
}

message DestroyChainResponse {}

// ---------------------------------------------------------------------------
// Phase 11: Graph detail & mutation messages
// ---------------------------------------------------------------------------

message GetGraphDetailRequest {
  string graph_id = 1;
}

message GraphNodeDetail {
  string node_id = 1;
  string type = 2;                // "input", "output", "plugin", "gain", "mixer", etc.
  string plugin_path = 3;         // Only for plugin nodes
  string format = 4;              // Only for plugin nodes ("vst3", "clap")
  uint32 input_channels = 5;      // Channel count of first input port
  uint32 output_channels = 6;     // Channel count of first output port
  uint32 input_port_count = 7;    // Number of input ports (valid indices: 0..N-1)
  uint32 output_port_count = 8;   // Number of output ports (valid indices: 0..N-1)
}

message GraphEdgeDetail {
  string edge_id = 1;
  string source_node_id = 2;
  uint32 source_port = 3;
  string dest_node_id = 4;
  uint32 dest_port = 5;
}

message GetGraphDetailResponse {
  string graph_id = 1;
  string name = 2;
  string state = 3;               // "inactive", "active"
  string strategy = 4;
  repeated GraphNodeDetail nodes = 5;
  repeated GraphEdgeDetail edges = 6;
}

message RemoveNodeRequest {
  string graph_id = 1;
  string node_id = 2;
}

message RemoveNodeResponse {}

message DisconnectNodesRequest {
  string graph_id = 1;
  string edge_id = 2;
}

message DisconnectNodesResponse {}

message OpenGraphNodeGuiRequest {
  string graph_id = 1;
  string node_id = 2;
  bool enable_audio = 3;
  string audio_device = 4;
}

message CloseGraphNodeGuiRequest {
  string graph_id = 1;
  string node_id = 2;
}

message CloseGraphNodeGuiResponse {}
