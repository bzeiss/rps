syntax = "proto3";
package rps.scanner;

// Scanner IPC — orchestrator → scanner worker
message ScanCommand {
  string plugin_path = 1;
  string format = 2;
  bool requires_ui = 3;
}

// Scanner IPC — scanner worker → orchestrator (wrapper)
message ScannerEvent {
  oneof event {
    ScanResultEvent scan_result = 1;
    ScanProgressEvent progress = 2;
    ScanErrorEvent error = 3;
  }
}

message ScanResultEvent {
  string name = 1;
  string vendor = 2;
  string version = 3;
  string uid = 4;
  string description = 5;
  string url = 6;
  string category = 7;
  string format = 8;
  string scan_method = 9;
  uint32 num_inputs = 10;
  uint32 num_outputs = 11;
  repeated ParameterInfo parameters = 12;
  map<string, string> extra_data = 13;

  message ParameterInfo {
    uint32 id = 1;
    string name = 2;
    double default_value = 3;
  }
}

message ScanProgressEvent {
  string status = 1;
  int32 progress_percentage = 2;
}

message ScanErrorEvent {
  string error = 1;
  string details = 2;
}
